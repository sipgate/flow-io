services:
  - type: web
    name: flow-io
    runtime: docker
    dockerfilePath: ./Dockerfile
    # NEXT_PUBLIC_* vars are baked in at build time
    buildArgs:
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: ${NEXT_PUBLIC_SUPABASE_URL}
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - key: NEXT_PUBLIC_APP_URL
        value: ${NEXT_PUBLIC_APP_URL}
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SIPGATE_OAUTH_CLIENT_ID
        sync: false
      - key: SIPGATE_OAUTH_CLIENT_SECRET
        sync: false
      - key: SIPGATE_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
